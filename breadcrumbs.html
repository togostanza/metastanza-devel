<!DOCTYPE html>

<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Breadcrumbs</title>

    <script type="module" src="./breadcrumbs.js" async></script>

    <script type="module">
      import createHelpApp from './-togostanza/help-app.js';

      const metadata = {"@context":{"stanza":"http://togostanza.org/resource/stanza#"},"@id":"breadcrumbs","stanza:label":"Breadcrumbs","stanza:definition":"Breadcrumbs MetaStanza ","stanza:type":"Stanza","stanza:provider":"TogoStanza","stanza:license":"MIT","stanza:author":"DBCLS","stanza:address":"https://github.com/togostanza/metastanza","stanza:contributor":["PENQE","Enishi Tech"],"stanza:created":"2022-04-07","stanza:updated":"2022-04-07","stanza:parameter":[{"stanza:key":"data-url","stanza:example":"https://raw.githubusercontent.com/togostanza/togostanza-data/main/samples/json/tree-data.json","stanza:description":"Data source URL","stanza:required":true},{"stanza:key":"data-type","stanza:type":"single-choice","stanza:choice":["json","tsv","csv","sparql-results-json"],"stanza:example":"json","stanza:description":"Data type","stanza:required":true},{"stanza:key":"custom_css_url","stanza:example":"","stanza:description":"Stylesheet(css file) URL to override current style","stanza:required":false},{"stanza:key":"node-key","stanza:type":"string","stanza:description":"Key of node unique id","stanza:example":"id","stanza:required":false},{"stanza:key":"node-initial_id","stanza:type":"string","stanza:description":"Initial node id","stanza:example":"6","stanza:required":false},{"stanza:key":"node-label_key","stanza:type":"string","stanza:description":"Initial node id","stanza:example":"label","stanza:required":false},{"stanza:key":"node-show_dropdown","stanza:type":"boolean","stanza:description":"Show node dropdown (neighbour nodes)","stanza:example":true,"stanza:required":false},{"stanza:key":"root_node-label_text","stanza:type":"string","stanza:description":"Text to show on root node","stanza:example":"Home","stanza:required":false},{"stanza:key":"root_node-label_icon","stanza:type":"string","stanza:description":"Icon to use on root node (Font-awesome icon names)","stanza:example":"Home","stanza:required":false},{"stanza:key":"show_copy_button","stanza:type":"boolean","stanza:description":"Show copy path button","stanza:example":false,"stanza:required":false}],"stanza:menu-placement":"bottom-right","stanza:style":[{"stanza:key":"--togostanza-fonts-font_family","stanza:type":"text","stanza:default":"Helvetica Neue","stanza:description":"Font family"},{"stanza:key":"--togostanza-fonts-font_color","stanza:type":"color","stanza:default":"#4E5059","stanza:description":"Label font color"},{"stanza:key":"--togostanza-fonts-font_color_hover","stanza:type":"color","stanza:default":"#f9f9fa","stanza:description":"Label font color on hover"},{"stanza:key":"--togostanza-fonts-font_size_primary","stanza:type":"number","stanza:default":9,"stanza:description":"Label font size"},{"stanza:key":"--togostanza-border-color","stanza:type":"color","stanza:default":"#DDDCDA","stanza:description":"Border color"},{"stanza:key":"--togostanza-border-width","stanza:type":"number","stanza:default":1,"stanza:description":"Border width"},{"stanza:key":"--togostanza-node-background_color_hover","stanza:type":"color","stanza:default":"#16ADE3","stanza:description":"Background color of the nodes on mouseover"},{"stanza:key":"--togostanza-node-background_color","stanza:type":"color","stanza:default":"#F0F0EF","stanza:description":"Background color of the nodes"},{"stanza:key":"--togostanza-theme-background-color","stanza:type":"color","stanza:default":"rgba(255,255,255,0)","stanza:description":"Background color"}],"stanza:incomingEvent":[{"stanza:key":"selectedDatumChanged","stanza:description":"An event, wich dispatches when user selects some node in other stanza"}],"stanza:outgoingEvent":[{"stanza:key":"selectedDatumChanged","stanza:description":"An event, wich dispatches when user selects some node in this stanza"}]};
      const readme   = "<h1>Breadcrumbs</h1>\n<p>You can copy the current path by clicking <code>copy_button</code> (enabled by setting <code>show_copy_button</code> to <code>true</code>)</p>\n<h2>Data and parameters</h2>\n<h3>JSON/sparql-results-json data format</h3>\n<p>In square brackets there are stanza params to be mapped to these data keys, data keys without brackets must be present in the data:</p>\n<pre><code class=\"language-js\">[\n    {\n      [node-key-id]:  1,\n      [node-label_key]: &quot;Transcript variant&quot;,\n      parent: [node.id]\n    },\n    ...\n]\n</code></pre>\n<p>For example,</p>\n<pre><code class=\"language-json\">[\n  {\n    &quot;id&quot;: 3,\n    &quot;value&quot;: &quot;coding_sequence_variant&quot;,\n    &quot;label&quot;: &quot;Coding sequence variant&quot;,\n    &quot;count&quot;: 18057,\n    &quot;description&quot;: &quot;A sequence variant that changes the coding sequence&quot;,\n    &quot;parent&quot;: 2\n    },\n    ...\n]\n\n</code></pre>\n<h3>CSV/TSV data format</h3>\n<pre><code class=\"language-csv\">[node-key-id],[node-label_key],parent,&lt;other optional data&gt;\n3,Coding sequence variant,1,&lt;other optional data&gt;\n</code></pre>\n<p>For example:</p>\n<pre><code class=\"language-csv\">id,label,parent,&lt;other optional data&gt;\n3,Coding sequence variant,1,&lt;other optional data&gt;\n</code></pre>\n<h3>Expected data types</h3>\n<p><code>[node-key-id]</code>,<code>[node-label-key]</code> are expecting String or Number</p>\n<p><code>parent</code> is expencted to be reference to <code>[node-key-id]</code> of some node, therefore, it should be the same type. if id is a String, <code>parent</code> value must be also a string.</p>\n<blockquote>\n<p>Note that <code>&quot;parent&quot;</code> key name should be present in the data</p>\n</blockquote>\n<h3>Multiple root nodes</h3>\n<p>If multiple root nodes are found ( nodes with undefined <code>parent</code> ), a root node with id <code>root</code> will be created. In that case, one can specify its label by setting <code>root_node-label_text</code>.\n<code>root_node-label_icon</code> can be used to show icon on the root node. Icon name is FontAwesome 5.0 icon name, in PascalCase, without any prefixes (<code>fa</code>, <code>fas</code> etc.) (example: &quot;Home&quot;, &quot;ArrowUp&quot; etc. For available icon names please refer to FontAwesome <a href=\"https://fontawesome.com/icons/magnifying-glass?s=solid&amp;f=classic\">website</a></p>\n<h3>Circular relations</h3>\n<p>Circular relations, i.e. if two nodes reference each other as a <code>parent</code> are not suppotred.</p>\n<h2>Overflow menus</h2>\n<p>If you want to display nodes dropdown menus to overlap with other elements on your page, add</p>\n<pre><code class=\"language-css\">.stanza-parent-element {\n  overflow: visible;\n}\n</code></pre>\n<p>to the stanza parent element CSS.</p>\n";

      createHelpApp({metadata, readme}).mount('body');
    </script>
  </head>

</html>
